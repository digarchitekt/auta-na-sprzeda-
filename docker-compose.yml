services:
  autanasprzedaz:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autanasprzedaz
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"

      # HTTPS router with Let's Encrypt
      - "traefik.http.routers.autanasprzedaz.rule=Host(`autanasprzedaz.com`) || Host(`www.autanasprzedaz.com`)"
      - "traefik.http.routers.autanasprzedaz.entrypoints=websecure"
      - "traefik.http.routers.autanasprzedaz.tls=true"
      - "traefik.http.routers.autanasprzedaz.tls.certresolver=letsencrypt"

      # www -> non-www canonical redirect
      - "traefik.http.routers.autanasprzedaz.middlewares=www-redirect"
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https?://www\\.autanasprzedaz\\.com/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://autanasprzedaz.com/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"

      # Backend service port
      - "traefik.http.services.autanasprzedaz.loadbalancer.server.port=3000"
